  <body>
    <div id="root"></div>

    <script>
      $(window).scroll(function () {
        var sticky = $('header'),
            scroll = $(window).scrollTop();
        if (scroll >= 50) sticky.addClass('stickyHeader');
        else sticky.removeClass('stickyHeader');
    });
    </script>
